<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="ArtiSkin icon mark">
  <!-- Outer circle — lens ring -->
  <circle cx="34" cy="34" r="28" stroke="#B85C38" stroke-width="2.5" fill="none"/>
  <!-- Middle layer ring — skin layer representation -->
  <ellipse cx="34" cy="34" rx="15" ry="11" fill="none" stroke="#B85C38" stroke-width="1.6" opacity="0.55"/>
  <!-- Inner fill — deepest layer -->
  <ellipse cx="34" cy="34" rx="7" ry="5" fill="#B85C38" opacity="0.20"/>
  <!-- Centre reveal dot -->
  <circle cx="34" cy="34" r="3" fill="#B85C38"/>
  <!-- Magnifier handle -->
  <line x1="56" y1="56" x2="66" y2="66" stroke="#B85C38" stroke-width="3.5" stroke-linecap="round"/>
</svg>
