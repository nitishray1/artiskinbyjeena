<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="ArtiSkin by Jeena logo">
  <!-- Icon mark: SAM lens circle with skin-layer lines -->
  <g transform="translate(0, 8)">
    <!-- Outer circle — lens / magnifier ring -->
    <circle cx="32" cy="32" r="28" stroke="#B85C38" stroke-width="2" fill="none"/>
    <!-- Inner organic layers — simplified skin cross-section -->
    <ellipse cx="32" cy="32" rx="14" ry="10" fill="none" stroke="#B85C38" stroke-width="1.4" opacity="0.55"/>
    <ellipse cx="32" cy="32" rx="7" ry="4.5" fill="#B85C38" opacity="0.18"/>
    <!-- Small centre dot — the reveal point -->
    <circle cx="32" cy="32" r="2.5" fill="#B85C38"/>
    <!-- Handle stub — magnifier handle bottom right -->
    <line x1="53.5" y1="53.5" x2="62" y2="62" stroke="#B85C38" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text
    x="80"
    y="44"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="36"
    font-weight="300"
    letter-spacing="-0.5"
    fill="#1C1612"
  >Arti<tspan fill="#B85C38">Skin</tspan></text>

  <!-- Sub-wordmark: by Jeena -->
  <text
    x="81"
    y="60"
    font-family="'Outfit', sans-serif"
    font-size="11"
    font-weight="500"
    letter-spacing="3"
    fill="#7A5C44"
    text-anchor="start"
  >BY JEENA</text>
</svg>
